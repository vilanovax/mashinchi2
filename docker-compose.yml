services:
  db:
    image: postgres:16-alpine
    container_name: mashinchi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mashinchi
      POSTGRES_USER: mashinchi
      POSTGRES_PASSWORD: mashinchi123
    ports:
      - "5434:5432"
    volumes:
      - mashinchi_data:/var/lib/postgresql/data

volumes:
  mashinchi_data:
