services:
  db:
    image: postgres:16-alpine
    container_name: mashinchi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mashinchi2
      POSTGRES_USER: mashinchi
      POSTGRES_PASSWORD: mashinchi
    ports:
      - "5434:5432"
    volumes:
      - mashinchi_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: mashinchi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mashinchi
      MINIO_ROOT_PASSWORD: mashinchi123
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - mashinchi_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot init: create bucket + make it publicly readable
  minio-init:
    image: minio/mc:latest
    container_name: mashinchi-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 mashinchi mashinchi123 &&
      (mc mb --ignore-existing local/cars) &&
      mc anonymous set download local/cars &&
      echo 'MinIO bucket ready';
      "

volumes:
  mashinchi_data:
  mashinchi_minio:
